<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario - Tercer trimestre</title>
</head>
<body>
    
    <form action="">
        <label for="name">Nombre: </label>
        <input type="text" id="nombre" name="nombre" placeholder="  Nombre" required >
        
        <label for="surname">Apellidos: </label>
        <input type="text" id="surname" name="surname" placeholder="  Apellidos" required>
        
        <label for="registro">ID</label>
        <input type="number" name="id" id="id" placeholder="id" required>

        <label for="edad">Edad: </label>
        <input type="number" name="edad" id="edad" placeholder="  Edad" required>

        <label for="email">Correo electronico: </label>
        <input type="email" name="email" id="email" placeholder="  Correo electronico" required>
    
        <label for="telefono">Telefono: </label>
        <input type="text" name="telefono" id="telefono" placeholder="Telefono" required>
        




        <label for="opciones" >Sexo: </label>
        <select name="" id=""required>
            <option value="Masculino" id="masculino">Masculino</option>
            <option value="Femenino" id="femenino">Femenino</option>
            <option value="NC" id="nc">NC</option>
        </select>



        <label for="aficiones">Aficiones: </label>
        <select name="" id="">
            <option value="Futbol" id="Futbol">Futbol</option>
            <option value="Baloncesto" id="Baloncesto">Baloncesto</option>
            <option value="Tenis" id="Tenis">Tenis</option>
            <option value="Natacion" id="Natacion">Natacion</option>
        </select>

        <label for="comentario">Comentarios: </label>
        <input type="text" name="comentario" id="comentario "width="50px" height="50px" placeholder="comentarios">

        <input type="submit"id="enviar" value="Enviar">
        <input type="reset" id="borrar" value="Borrar">

        <script src="./../javascript/Formulario2.js"></script>

            
    </form>
















</body>
</html>
